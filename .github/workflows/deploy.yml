name: Encrypt and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install staticrypt
        run: npm install -g staticrypt

      - name: Build encrypted site
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          set -e
          mkdir -p _site/vr200/archive _site/linkou-rental
          cp vr200/style.css _site/vr200/style.css 2>/dev/null || true

          encrypt() {
            staticrypt "$1" --password "$SITE_PASSWORD" --short \
              --template-title "家庭資訊站" \
              --template-instructions "請輸入家庭密碼" \
              --template-button "進入" \
              --template-color-primary "#7c3aed" \
              --template-color-secondary "#0a0a0f" \
              --template-error "密碼錯誤" \
              --template-placeholder "密碼" \
              --remember 30 -d "$2"
          }

          encrypt index.html _site
          for f in vr200/index.html vr200/stocks.html vr200/backtest.html vr200/news.html; do
            [ -f "$f" ] && encrypt "$f" _site/vr200 || true
          done
          for f in vr200/archive/*.html; do
            [ -f "$f" ] && encrypt "$f" _site/vr200/archive || true
          done

          staticrypt linkou-rental/index.html --password "$SITE_PASSWORD" --short \
            --template-title "林口出租報告" \
            --template-instructions "請輸入家庭密碼" \
            --template-button "進入" \
            --template-color-primary "#0e7490" \
            --template-color-secondary "#f4f4f5" \
            --template-error "密碼錯誤" \
            --template-placeholder "密碼" \
            --remember 30 -d _site/linkou-rental

          touch _site/.nojekyll

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
