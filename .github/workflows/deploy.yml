name: Encrypt and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install staticrypt
        run: npm install -g staticrypt

      - name: Encrypt all HTML files
        env:
          STATICRYPT_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          mkdir -p _site
          # Copy non-HTML assets first
          find . -type f \( -name "*.css" -o -name "*.js" -o -name "*.png" -o -name "*.jpg" -o -name "*.svg" \) \
            -not -path "./.git/*" -not -path "./_site/*" -not -path "./node_modules/*" | while read f; do
            mkdir -p "_site/$(dirname "$f")"
            cp "$f" "_site/$f"
          done
          # Encrypt all HTML files
          staticrypt --recursive . \
            --password "$STATICRYPT_PASSWORD" \
            --short \
            --template-title "🔒 家庭資訊站" \
            --template-instructions "請輸入家庭密碼" \
            --template-button "進入" \
            --template-color-primary "#7c3aed" \
            --template-color-secondary "#0a0a0f" \
            --template-error "密碼錯誤" \
            --template-placeholder "密碼" \
            --remember 30 \
            --template-remember "保持登入 30 天" \
            -d _site \
            || true
          # Make sure .nojekyll exists
          touch _site/.nojekyll

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
